<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People | KEG Admin</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-logo"><span>KEG</span> Admin</div>
      <div class="sidebar-nav">
        <a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="articles.html"><i class="fas fa-newspaper"></i> Articles</a>
        <a href="events.html"><i class="fas fa-calendar-alt"></i> Events</a>
        <a href="people.html" class="active"><i class="fas fa-user-friends"></i> People</a>
        <a href="recruitments.html"><i class="fas fa-briefcase"></i> Recruitments</a>
        <a href="subscribers.html"><i class="fas fa-users"></i> Subscribers</a>
        <a href="newsletters.html"><i class="fas fa-envelope"></i> Newsletters</a>
        <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a>
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </nav>

    <div class="main-content">
      <div class="page-header">
        <h1>People</h1>
        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> New Person</button>
      </div>

      <div class="card" style="margin-bottom:15px; display:flex; gap:10px; align-items:center;">
        <select class="form-control" id="filterRole" style="width:auto;" onchange="loadPeople()">
          <option value="">All Roles</option>
          <option value="faculty">Faculty</option>
          <option value="phd">PhD</option>
          <option value="master">Master</option>
          <option value="postdoc">Postdoc</option>
          <option value="alumni">Alumni</option>
        </select>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Photo</th><th>Name</th><th>Role</th><th>Title / Supervisor</th><th>Email</th><th>Active</th><th>Actions</th></tr></thead>
            <tbody id="peopleList"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">New Person</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="personForm">
        <input type="hidden" id="personId">
        <div class="form-group">
          <label>Name *</label>
          <input type="text" class="form-control" id="pName" required>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
          <div class="form-group">
            <label>Role</label>
            <select class="form-control" id="pRole">
              <option value="faculty">Faculty</option>
              <option value="phd" selected>PhD</option>
              <option value="master">Master</option>
              <option value="postdoc">Postdoc</option>
              <option value="alumni">Alumni</option>
            </select>
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" class="form-control" id="pTitle" placeholder="e.g. Professor">
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
          <div class="form-group">
            <label>Photo</label>
            <input type="file" id="pPhotoFile" accept="image/*" onchange="handlePhotoUpload(this)">
            <input type="text" class="form-control" id="pPhoto" placeholder="faculty/jie.png" style="margin-top:5px;">
            <img id="pPhotoPreview" style="max-height:60px; margin-top:8px; display:none; border-radius:4px;">
          </div>
          <div class="form-group">
            <label>Photo Position (CSS)</label>
            <input type="text" class="form-control" id="pPhotoPosition" placeholder="50% 50%">
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
          <div class="form-group">
            <label>Link (URL)</label>
            <input type="url" class="form-control" id="pLink" placeholder="https://...">
          </div>
          <div class="form-group">
            <label>Supervisor</label>
            <input type="text" class="form-control" id="pSupervisor">
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-control" id="pEmail">
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea class="form-control" id="pBio" rows="3"></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px;">
          <div class="form-group">
            <label>Year Start</label>
            <input type="number" class="form-control" id="pYearStart" placeholder="2020">
          </div>
          <div class="form-group">
            <label>Year End</label>
            <input type="number" class="form-control" id="pYearEnd" placeholder="Leave empty for present">
          </div>
          <div class="form-group">
            <label>Sort Order</label>
            <input type="number" class="form-control" id="pSortOrder" value="0">
          </div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="pActive" checked> Active</label>
        </div>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    let currentPage = 1;

    async function loadPeople(page = 1) {
      currentPage = page;
      const role = document.getElementById('filterRole').value;
      let url = `/api/people?page=${page}&limit=20`;
      if (role) url += `&role=${role}`;

      const data = await api(url);
      const tbody = document.getElementById('peopleList');

      if (data.people.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">No people found</td></tr>';
      } else {
        tbody.innerHTML = data.people.map(p => `
          <tr>
            <td>${p.photo ? `<img src="/${p.photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;${p.photo_position ? 'object-position:'+p.photo_position : ''}">` : '—'}</td>
            <td><strong>${p.name}</strong></td>
            <td><span class="badge badge-info">${p.role}</span></td>
            <td>${p.title || p.supervisor || '—'}</td>
            <td>${p.email || '—'}</td>
            <td>${p.is_active ? '<span class="badge badge-success">Yes</span>' : '<span class="badge badge-warning">No</span>'}</td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editPerson(${p.id})"><i class="fas fa-edit"></i></button>
              <button class="btn btn-danger btn-sm" onclick="deletePerson(${p.id})"><i class="fas fa-trash"></i></button>
            </td>
          </tr>
        `).join('');
      }

      renderPagination(document.getElementById('pagination'), data.pagination, loadPeople);
    }

    function openModal(person = null) {
      document.getElementById('modalTitle').textContent = person ? 'Edit Person' : 'New Person';
      document.getElementById('personId').value = person ? person.id : '';
      document.getElementById('pName').value = person ? person.name : '';
      document.getElementById('pRole').value = person ? person.role : 'phd';
      document.getElementById('pTitle').value = person ? (person.title || '') : '';
      document.getElementById('pPhoto').value = person ? (person.photo || '') : '';
      document.getElementById('pPhotoPosition').value = person ? (person.photo_position || '') : '';
      document.getElementById('pLink').value = person ? (person.link || '') : '';
      document.getElementById('pSupervisor').value = person ? (person.supervisor || '') : '';
      document.getElementById('pEmail').value = person ? (person.email || '') : '';
      document.getElementById('pBio').value = person ? (person.bio || '') : '';
      document.getElementById('pYearStart').value = person ? (person.year_start || '') : '';
      document.getElementById('pYearEnd').value = person ? (person.year_end || '') : '';
      document.getElementById('pSortOrder').value = person ? (person.sort_order || 0) : 0;
      document.getElementById('pActive').checked = person ? !!person.is_active : true;

      const preview = document.getElementById('pPhotoPreview');
      if (person && person.photo) {
        preview.src = '/' + person.photo;
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }

      document.getElementById('modalOverlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.getElementById('personForm').reset();
    }

    async function editPerson(id) {
      const person = await api(`/api/people/${id}`);
      openModal(person);
    }

    async function deletePerson(id) {
      if (!confirm('Delete this person?')) return;
      await api(`/api/people/${id}`, { method: 'DELETE' });
      toast('Person deleted');
      loadPeople(currentPage);
    }

    async function handlePhotoUpload(input) {
      if (!input.files[0]) return;
      try {
        const url = await uploadImage(input.files[0]);
        document.getElementById('pPhoto').value = url;
        const preview = document.getElementById('pPhotoPreview');
        preview.src = url;
        preview.style.display = 'block';
        toast('Photo uploaded');
      } catch (err) {
        toast(err.message, 'error');
      }
    }

    document.getElementById('personForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('personId').value;
      const body = {
        name: document.getElementById('pName').value,
        role: document.getElementById('pRole').value,
        title: document.getElementById('pTitle').value,
        photo: document.getElementById('pPhoto').value,
        photo_position: document.getElementById('pPhotoPosition').value,
        link: document.getElementById('pLink').value,
        supervisor: document.getElementById('pSupervisor').value,
        email: document.getElementById('pEmail').value,
        bio: document.getElementById('pBio').value,
        year_start: document.getElementById('pYearStart').value ? parseInt(document.getElementById('pYearStart').value) : null,
        year_end: document.getElementById('pYearEnd').value ? parseInt(document.getElementById('pYearEnd').value) : null,
        sort_order: parseInt(document.getElementById('pSortOrder').value) || 0,
        is_active: document.getElementById('pActive').checked,
      };

      if (id) {
        await api(`/api/people/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        toast('Person updated');
      } else {
        await api('/api/people', { method: 'POST', body: JSON.stringify(body) });
        toast('Person created');
      }

      closeModal();
      loadPeople(currentPage);
    });

    checkAuth().then(() => loadPeople());
  </script>
</body>
</html>
